version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production

    # Expose the port internally only – avoids host port conflicts.
    # Coolify's reverse proxy (Traefik) will route traffic to port 3000.
    expose:
      - "3000"

    environment:
      - NGINX_PORT=3000

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
