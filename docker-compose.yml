# ─────────────────────────────────────────────────────────────────
# docker-compose.yml — Static HTML/CSS/JS site
# Coolify-ready: uses 'expose' instead of hardcoded host port
# mappings to avoid conflicts on shared hosts.
# ─────────────────────────────────────────────────────────────────

version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production

    # Expose internally only — Coolify's reverse proxy handles the
    # external routing. No host port binding to prevent conflicts.
    expose:
      - "80"

    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
